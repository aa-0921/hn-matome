name: "HackerNews 日本語まとめ & AI要約 毎日更新"

on:
  schedule:
    - cron: '0 22 * * *'   # UTC 22:00 = JST 7:00
    - cron: '0 3 * * *'    # UTC 3:00  = JST 12:00
    - cron: '0 14 * * *'   # UTC 14:00 = JST 23:00
  workflow_dispatch:        # 手動実行用

concurrency:
  group: hn-daily-update-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: hn-matome-core（core）をチェックアウト
        uses: actions/checkout@v4
        with:
          repository: aa-0921/hn-matome-core
          path: core
          ref: main
          token: ${{ secrets.CORE_REPO_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存インストール
        run: pip install -r requirements.txt

      - name: 既存JSONキャッシュを core へコピー
        run: |
          mkdir -p core/docs/data
          if [ -d docs/data ] && [ "$(ls -A docs/data 2>/dev/null)" ]; then
            cp -R docs/data/. core/docs/data/
          fi

      - name: 実行スロットを決定
        id: slot
        run: |
          HOUR=$(TZ=Asia/Tokyo date +%H)
          if [ "$HOUR" -ge 6 ] && [ "$HOUR" -lt 10 ]; then
            echo "value=07" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -ge 10 ] && [ "$HOUR" -lt 16 ]; then
            echo "value=12" >> $GITHUB_OUTPUT
          else
            echo "value=23" >> $GITHUB_OUTPUT
          fi

      - name: HN データ取得・翻訳・HTML 生成
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SLOT: ${{ steps.slot.outputs.value }}
        run: cd core && python -m scripts.fetch_and_generate --slot "$SLOT"

      - name: 生成した docs をワークフロー対象リポジトリへ同期
        run: |
          rm -rf docs/archive docs/pagefind docs/index.html docs/about.html docs/privacy.html docs/sitemap.xml docs/robots.txt docs/latest
          cp -R core/docs/. docs/

      - name: Pagefind 検索インデックスを生成
        run: npx pagefind --site docs --output-path docs/pagefind

      - name: 変更をコミット・プッシュ
        env:
          SLOT: ${{ steps.slot.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update: $(TZ=Asia/Tokyo date +%Y-%m-%d) ${SLOT}:00"
          # リモートが進んだ場合を考慮して、rebase + push をリトライする
          # docs は自動生成物なので、衝突時はこのジョブで生成した内容を優先する
          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}/3"
            git fetch origin main
            if ! git rebase -X ours origin/main; then
              # modify/delete 衝突（DU）を解消: docs/ は再生成物なので削除を優先
              if git status --short | grep -q '^DU '; then
                git status --short | grep '^DU ' | cut -c4- | xargs git rm -f
                if ! git rebase --continue --no-edit; then
                  git rebase --abort || true
                  sleep $((attempt * 2))
                  continue
                fi
              else
                git rebase --abort || true
                sleep $((attempt * 2))
                continue
              fi
            fi
            if git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 2))
          done
          echo "Push failed after 3 attempts"
          exit 1
