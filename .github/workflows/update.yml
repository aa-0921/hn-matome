name: HN日報 毎日更新

on:
  schedule:
    - cron: '0 23 * * *'  # UTC 23:00 = JST 8:00
  workflow_dispatch:       # 手動実行用

concurrency:
  group: hn-daily-update-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: hn-matome-core（core）をチェックアウト
        uses: actions/checkout@v4
        with:
          repository: aa-0921/hn-matome-core
          path: core
          ref: main
          token: ${{ secrets.CORE_REPO_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存インストール
        run: pip install -r requirements.txt

      - name: HN データ取得・翻訳・HTML 生成
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd core && python -m scripts.fetch_and_generate

      - name: 生成した docs をワークフロー対象リポジトリへ同期
        run: |
          rm -rf docs/archive docs/pagefind docs/index.html docs/about.html docs/privacy.html docs/sitemap.xml docs/robots.txt docs/latest
          cp -R core/docs/. docs/

      - name: Pagefind 検索インデックスを生成
        run: npx pagefind --site docs --output-path docs/pagefind

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update: $(TZ=Asia/Tokyo date +%Y-%m-%d)"
          # リモートが進んだ場合を考慮して、rebase + push をリトライする
          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}/3"
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            sleep $((attempt * 2))
          done
          echo "Push failed after 3 attempts"
          exit 1
