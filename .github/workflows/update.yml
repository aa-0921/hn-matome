name: "HackerNews 日本語まとめ & AI要約 毎日更新"

on:
  schedule:
    - cron: '0 22 * * *'   # UTC 22:00 = JST 7:00
    - cron: '0 3 * * *'    # UTC 3:00  = JST 12:00
    - cron: '0 14 * * *'   # UTC 14:00 = JST 23:00
  workflow_dispatch:        # 手動実行用

concurrency:
  group: hn-daily-update-main
  cancel-in-progress: false

permissions: {}

jobs:
  update:
    permissions:
      contents: write
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: hn-matome-core（core）をチェックアウト
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: aa-0921/hn-matome-core
          path: core
          ref: main
          token: ${{ secrets.CORE_REPO_TOKEN }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: 依存インストール
        run: pip install -r requirements.txt

      - name: 既存JSONキャッシュを core へコピー
        run: |
          mkdir -p core/docs/data
          if [ -d docs/data ] && [ "$(ls -A docs/data 2>/dev/null)" ]; then
            cp -R docs/data/. core/docs/data/
          fi

      - name: 既存アーカイブHTMLを core へコピー（データ保全）
        run: |
          mkdir -p core/docs/archive
          if [ -d docs/archive ] && [ "$(ls -A docs/archive 2>/dev/null)" ]; then
            cp -R docs/archive/. core/docs/archive/
          fi

      - name: 既存週間分析データを core へコピー
        run: |
          mkdir -p core/docs/data/weekly core/docs/weekly
          if [ -d docs/data/weekly ] && [ "$(ls -A docs/data/weekly 2>/dev/null)" ]; then
            cp -R docs/data/weekly/. core/docs/data/weekly/
          fi
          if [ -d docs/weekly ] && [ "$(ls -A docs/weekly 2>/dev/null)" ]; then
            cp -R docs/weekly/. core/docs/weekly/
          fi

      - name: 実行スロットを決定
        id: slot
        run: |
          HOUR=$(TZ=Asia/Tokyo date +%H)
          if [ "$HOUR" -ge 6 ] && [ "$HOUR" -lt 10 ]; then
            echo "value=07" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -ge 10 ] && [ "$HOUR" -lt 16 ]; then
            echo "value=12" >> $GITHUB_OUTPUT
          else
            echo "value=23" >> $GITHUB_OUTPUT
          fi

      - name: 曜日判定（日曜なら週間分析も実行）
        id: weekday
        run: |
          DOW=$(TZ=Asia/Tokyo date +%u)
          echo "is_sunday=$([ "$DOW" -eq 7 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: HN データ取得・翻訳・HTML 生成
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SLOT: ${{ steps.slot.outputs.value }}
          IS_SUNDAY: ${{ steps.weekday.outputs.is_sunday }}
        run: |
          WEEKLY_FLAG=""
          if [ "$IS_SUNDAY" = "true" ] && [ "$SLOT" = "23" ]; then
            WEEKLY_FLAG="--weekly"
          fi
          cd core && python -m scripts.fetch_and_generate --slot "$SLOT" $WEEKLY_FLAG

      - name: 翻訳全滅を検知して Issue 通知
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLOT: ${{ steps.slot.outputs.value }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          METRICS_FILE=core/docs/run-metrics.json
          if [ ! -f "$METRICS_FILE" ]; then
            echo "::warning::run-metrics.json が存在しません (script が途中で死んだ可能性)"
            exit 0
          fi
          TRANSLATE_REQ=$(jq -r '.translate_requests // 0' "$METRICS_FILE")
          TRANSLATE_FAIL=$(jq -r '.translate_failures // 0' "$METRICS_FILE")
          SUMMARIES_OK=$(jq -r '.summaries_success // 0' "$METRICS_FILE")
          SUMMARIZE_REQ=$(jq -r '.summarize_requests // 0' "$METRICS_FILE")
          echo "translate_req=$TRANSLATE_REQ translate_fail=$TRANSLATE_FAIL summaries_ok=$SUMMARIES_OK summarize_req=$SUMMARIZE_REQ"

          ISSUE_TITLE="[緊急] hn-matome 日本語翻訳機能が停止しています"
          if [ "$TRANSLATE_REQ" -gt 0 ] && \
             [ "$TRANSLATE_FAIL" -eq "$TRANSLATE_REQ" ] && \
             [ "$SUMMARIES_OK" -eq 0 ]; then
            EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" \
                        --state open --search "in:title hn-matome 日本語翻訳機能が停止" \
                        --json number --jq '.[0].number // empty')
            BODY="Slot: $SLOT
          Run: $RUN_URL

          ## Metrics
          - translate_requests: $TRANSLATE_REQ
          - translate_failures: $TRANSLATE_FAIL
          - summarize_requests: $SUMMARIZE_REQ
          - summaries_success: $SUMMARIES_OK

          全タイトル翻訳が失敗し、コメント要約も 0 件成功しました。
          OpenRouter API の状態 (キー失効 / credit 不足 / モデル提供停止 / rate limit) を確認してください。

          調査手順:
          1. gh run view でログを確認し 403/401/429 の有無を確認
          2. OpenRouter Dashboard でキーの状態と残高を確認
          3. 一次対処: モデルを別の :free tier に切替"
            if [ -n "$EXISTING" ]; then
              echo "既存 issue #$EXISTING にコメント追記"
              gh issue comment "$EXISTING" --repo "$GITHUB_REPOSITORY" --body "$BODY"
            else
              echo "新規 issue を作成"
              gh issue create --repo "$GITHUB_REPOSITORY" \
                --title "$ISSUE_TITLE" \
                --assignee aa-0921 \
                --body "$BODY"
            fi
          else
            echo "翻訳は機能している (or 部分失敗のみ) → 通知スキップ"
            EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" \
                        --state open --search "in:title hn-matome 日本語翻訳機能が停止" \
                        --json number --jq '.[0].number // empty')
            if [ -n "$EXISTING" ] && [ "$TRANSLATE_REQ" -gt 0 ] && [ "$TRANSLATE_FAIL" -lt "$TRANSLATE_REQ" ]; then
              gh issue close "$EXISTING" --repo "$GITHUB_REPOSITORY" \
                --comment "翻訳が復旧しました (translate_failures=$TRANSLATE_FAIL / $TRANSLATE_REQ, Run: $RUN_URL)"
            fi
          fi

      - name: 生成した docs をワークフロー対象リポジトリへ同期
        run: |
          rm -rf docs/archive docs/weekly docs/pagefind docs/index.html docs/about.html docs/privacy.html docs/terms.html docs/sitemap.xml docs/robots.txt docs/latest
          cp -R core/docs/. docs/

      - name: Pagefind 検索インデックスを生成
        run: npx pagefind --site docs --output-path docs/pagefind

      - name: 変更をコミット・プッシュ
        env:
          SLOT: ${{ steps.slot.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update: $(TZ=Asia/Tokyo date +%Y-%m-%d) ${SLOT}:00"
          # リモートが進んだ場合を考慮して、rebase + push をリトライする
          # docs は自動生成物なので、衝突時はこのジョブで生成した内容を優先する
          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}/3"
            git fetch origin main
            if ! git rebase -X ours origin/main; then
              # modify/delete 衝突（DU）を解消: docs/ は再生成物なので削除を優先
              if git status --short | grep -q '^DU '; then
                git status --short | grep '^DU ' | cut -c4- | xargs git rm -f
                if ! git rebase --continue --no-edit; then
                  git rebase --abort || true
                  sleep $((attempt * 2))
                  continue
                fi
              else
                git rebase --abort || true
                sleep $((attempt * 2))
                continue
              fi
            fi
            if git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 2))
          done
          echo "Push failed after 3 attempts"
          exit 1
